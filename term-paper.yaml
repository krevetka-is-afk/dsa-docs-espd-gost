# term-paper project configuration
# Положите основной ТЗ в директорию inputs.tz_dir
# Если нужен командный ПМИ, положите командное ТЗ в ./input/tz-team
# Положите архивы кода или папки репозиториев в директорию inputs.code_dir
# В inputs.notes_file можно добавить дополнительные требования, скриншоты и замечания
project:
    name: 'Цифровой Ассистент Студента: серверная часть'
    english_name: Digital Student Assistant
    code: "12.17"
    summary: Веб-платформа для подбора и сопровождения студенческих проектов ВШЭ. Система объединяет каталог проектов, импорт ЭПП из XLSX, роли студентов, заказчиков и сотрудников ЦППРП, модерацию, заявки, избранное, интересы и рекомендации. Основной контур реализован как Django + DRF с HTML-интерфейсом на Django templates, отдельным FastAPI ML-сервисом и graph-сервисом на Neo4j. Серверная часть публикует доменные события через outbox API доставки событий, а внешние потребители используют их для обновления индекса рекомендаций и графовой проекции. В актуальной версии добавлены подтверждение адреса электронной почты при регистрации, django-unfold admin, домен faculty для синхронизации преподавателей/публикаций/курсов и сопоставления научных руководителей проектов с профилями HSE. Целевое окружение использует PostgreSQL, Docker Compose, Nginx и сценарии для развертывания, резервного копирования и синхронизации окружения.
    type: backend web-service
student:
    name: С. Е. Растворов
    group: БПИ236
supervisor:
    name: А. А. Паринов
    position: 'Старший преподаватель: Департамент анализа данных и искусственного интеллекта, НИУ ВШЭ'
approver:
    name: Н. А. Павлочев
    position: Академический руководитель образовательной программы "Программная инженерия", старший преподаватель департамента программной инженерии
organization:
    name: Национальный исследовательский университет "Высшая школа экономики"
inputs:
    code_dir: ./input/code
    tz_dir: ./input/tz
    notes_file: ./input/notes.txt
    source_priority: code
